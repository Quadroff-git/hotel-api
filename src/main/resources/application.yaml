spring:
  application:
    name: hotel-api

  profiles:
    default: h2

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
    drop-first: false
    default-schema: public

server:
  port: 8092
  servlet:
    contextPath: /property-view
  error:
    include-message: always
    include-binding-errors: always