databaseChangeLog:
  - changeSet:
      id: 1
      author: your-name
      labels: "schema-initialization"
      context: "all"
      changes:
        # Create hotel table
        - createTable:
            tableName: hotel
            remarks: "Main table storing hotel information"
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(2000)
              - column:
                  name: brand
                  type: VARCHAR(255)
              # Address fields
              - column:
                  name: house_number
                  type: VARCHAR(255)
              - column:
                  name: street
                  type: VARCHAR(255)
              - column:
                  name: city
                  type: VARCHAR(255)
              - column:
                  name: country
                  type: VARCHAR(255)
              - column:
                  name: post_code
                  type: VARCHAR(255)
              # Contacts fields
              - column:
                  name: phone
                  type: VARCHAR(255)
              - column:
                  name: email
                  type: VARCHAR(255)
              # ArrivalTime fields
              - column:
                  name: check_in_time
                  type: VARCHAR(255)
              - column:
                  name: check_out_time
                  type: VARCHAR(255)

        # Create hotel_amenities table for the element collection
        - createTable:
            tableName: hotel_amenities
            remarks: "Mapping table for hotel amenities"
            columns:
              - column:
                  name: hotel_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: amenity
                  type: VARCHAR(255)
                  constraints:
                    nullable: false

        # Add primary key to hotel_amenities (composite key)
        - addPrimaryKey:
            tableName: hotel_amenities
            columnNames: hotel_id, amenity
            constraintName: pk_hotel_amenities

        # Add foreign key constraint
        - addForeignKeyConstraint:
            constraintName: fk_hotel_amenities_hotel
            baseTableName: hotel_amenities
            baseColumnNames: hotel_id
            referencedTableName: hotel
            referencedColumnNames: id
            onDelete: CASCADE
            onUpdate: RESTRICT

      rollback:
        - dropTable:
            tableName: hotel_amenities
        - dropTable:
            tableName: hotel